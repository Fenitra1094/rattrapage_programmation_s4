version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-container
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Akoho@Password123
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./script.sql:/script.sql
    command: >
      bash -c "
      /opt/mssql/bin/sqlservr &
      until /opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P 'Akoho@Password123' -C -Q 'SELECT 1' > /dev/null 2>&1; do
        sleep 5
      done &&
      /opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P 'Akoho@Password123' -C -i /script.sql &&
      tail -f /dev/null
      "

volumes:
  sqlserver-data:
    driver: local