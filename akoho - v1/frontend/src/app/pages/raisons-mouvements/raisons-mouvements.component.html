<div class="page-header">
  <h1>Raisons de Mouvement</h1>
  <button class="btn btn-primary" (click)="openCreate()">+ Nouvelle Raison</button>
</div>

<div class="card">
  @if (items.length === 0) {
    <div class="empty-state">Aucune raison enregistrée</div>
  } @else {
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Libellé</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (item of items; track item.id) {
          <tr>
            <td>{{ item.id }}</td>
            <td>{{ item.libelle }}</td>
            <td>
              <div class="actions">
                <button class="btn btn-secondary btn-sm" (click)="openEdit(item)">Modifier</button>
                <button class="btn btn-danger btn-sm" (click)="delete(item.id)">Supprimer</button>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  }
</div>

@if (showModal) {
  <div class="modal-backdrop" (click)="showModal = false">
    <div class="modal" (click)="$event.stopPropagation()">
      <h2>{{ editing ? 'Modifier' : 'Nouvelle' }} Raison</h2>
      <div class="form-group">
        <label>Libellé</label>
        <input type="text" [(ngModel)]="form.libelle" placeholder="Libellé de la raison">
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" (click)="showModal = false">Annuler</button>
        <button class="btn btn-primary" (click)="save()">{{ editing ? 'Modifier' : 'Créer' }}</button>
      </div>
    </div>
  </div>
}
